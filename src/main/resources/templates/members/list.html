<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Members</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #2196F3; color: white; }
        a { margin: 10px 5px; padding: 8px 16px; background: #2196F3; color: white; text-decoration: none; border-radius: 4px; display: inline-block; }
        a.delete { background: #e53935; }
    </style>
</head>
<body>
    <h1>👤 Members</h1>
    <a href="/">Home</a>
    <a href="/members/add">+ Add Member</a>
    <br/><br/>
    <table>
        <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Membership Date</th><th>Action</th>
        </tr>
        <tr th:each="member : ${members}">
            <td th:text="${member.id}"></td>
            <td th:text="${member.name}"></td>
            <td th:text="${member.email}"></td>
            <td th:text="${member.phone}"></td>
            <td th:text="${member.membershipDate}"></td>
            <td><a class="delete" th:href="@{/members/delete/{id}(id=${member.id})}">Delete</a></td>
        </tr>
    </table>
</body>
</html>
