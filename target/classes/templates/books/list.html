<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #4CAF50; color: white; }
        a { margin: 10px 5px; padding: 8px 16px; background: #4CAF50; color: white; text-decoration: none; border-radius: 4px; display: inline-block; }
        a.delete { background: #e53935; }
        input { padding: 8px; width: 300px; margin-right: 8px; }
        button { padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>📖 Books</h1>
    <a href="/">Home</a>
    <a href="/books/add">+ Add Book</a>
    <br/><br/>
    <form action="/books/search" method="get">
        <input type="text" name="query" placeholder="Search by title..."/>
        <button type="submit">Search</button>
    </form>
    <br/>
    <table>
        <tr>
            <th>ID</th><th>Title</th><th>Author</th><th>ISBN</th><th>Available Copies</th><th>Action</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.availableCopies}"></td>
            <td><a class="delete" th:href="@{/books/delete/{id}(id=${book.id})}">Delete</a></td>
        </tr>
    </table>
</body>
</html>
