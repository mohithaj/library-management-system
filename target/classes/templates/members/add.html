<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Member</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        form { background: white; padding: 30px; border-radius: 8px; width: 400px; }
        label { font-weight: bold; }
        input { width: 100%; padding: 8px; margin: 8px 0 16px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        a { display: inline-block; margin-top: 15px; color: #2196F3; }
    </style>
</head>
<body>
    <h1>Add New Member</h1>
    <form action="/members/add" method="post" th:object="${member}">
        <label>Name</label>
        <input type="text" th:field="*{name}" required/>
        <label>Email</label>
        <input type="email" th:field="*{email}" required/>
        <label>Phone</label>
        <input type="text" th:field="*{phone}"/>
        <button type="submit">Add Member</button>
    </form>
    <a href="/members">← Back to Members</a>
</body>
</html>
