<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Records</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #FF9800; color: white; }
        a { margin: 10px 5px; padding: 8px 16px; background: #FF9800; color: white; text-decoration: none; border-radius: 4px; display: inline-block; }
        a.return-btn { background: #4CAF50; }
        .ISSUED { color: red; font-weight: bold; }
        .RETURNED { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📋 Issue Records</h1>
    <a href="/">Home</a>
    <a href="/issues/issue">+ Issue a Book</a>
    <br/><br/>
    <table>
        <tr>
            <th>ID</th><th>Book</th><th>Member</th><th>Issue Date</th><th>Due Date</th><th>Return Date</th><th>Status</th><th>Action</th>
        </tr>
        <tr th:each="issue : ${issues}">
            <td th:text="${issue.id}"></td>
            <td th:text="${issue.book.title}"></td>
            <td th:text="${issue.member.name}"></td>
            <td th:text="${issue.issueDate}"></td>
            <td th:text="${issue.dueDate}"></td>
            <td th:text="${issue.returnDate != null ? issue.returnDate : '-'}"></td>
            <td><span th:text="${issue.status}" th:class="${issue.status}"></span></td>
            <td>
                <a class="return-btn" th:if="${issue.status == 'ISSUED'}" th:href="@{/issues/return/{id}(id=${issue.id})}">Return</a>
            </td>
        </tr>
    </table>
</body>
</html>
